# Example reverse proxy for EC2 + Nginx deployment.
# - Serves frontend build from /var/www/zetapulse
# - Proxies API + WS to backend (uvicorn behind systemd or docker)

server {
  listen 80;
  server_name _;

  root /var/www/zetapulse;
  index index.html;

  location / {
    try_files $uri /index.html;
  }

  location /api/ {
    proxy_pass http://127.0.0.1:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location /ws/ {
    proxy_pass http://127.0.0.1:8000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
  }
}
