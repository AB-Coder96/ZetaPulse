version: "3.9"

services:
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: zetapulse_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: zetapulse
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./backend/docker/initdb:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d zetapulse"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: zetapulse_redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: zetapulse_backend
    env_file:
      - ./.env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://postgres:postgres@db:5432/zetapulse}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      ENABLE_DEMO_PUBLISHER: ${ENABLE_DEMO_PUBLISHER:-true}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      GIT_COMMIT_SHA: ${GIT_COMMIT_SHA:-dev}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend:/app
    command: ["bash", "-lc", "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"]

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: zetapulse_worker
    env_file:
      - ./.env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://postgres:postgres@db:5432/zetapulse}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      GIT_COMMIT_SHA: ${GIT_COMMIT_SHA:-dev}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend:/app
    command: ["bash", "-lc", "celery -A app.tasks.celery_app:celery_app worker -l INFO"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: zetapulse_frontend
    env_file:
      - ./.env
    environment:
      VITE_API_BASE: ${VITE_API_BASE:-http://localhost:8000}
      VITE_WS_BASE: ${VITE_WS_BASE:-ws://localhost:8000}
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
    command: ["bash", "-lc", "npm install && npm run dev -- --host 0.0.0.0 --port 5173"]

volumes:
  db_data:
  redis_data:
